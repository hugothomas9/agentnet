</linearGradient>
<linearGradient id="sgh" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#9945FF" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#14F195" stop-opacity="0.18"/>
</linearGradient>
</defs>

<!-- dark canvas -->
