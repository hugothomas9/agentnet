<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A hexagonal node graph with a central diamond agent node, six outer nodes, and chain-link connectors, rendered in a Solana-inspired purple-to-teal gradient on a dark background.</desc>
<defs>
<linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#9945FF"/>
<stop offset="100%" stop-color="#14F195"/>
</linearGradient>
